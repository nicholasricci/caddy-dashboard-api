basePath: /
definitions:
  handlers.applyConfigRequest:
    properties:
      config:
        type: object
    required:
    - config
    type: object
  handlers.createAPIKeyRequest:
    properties:
      allowed_discovery_config_ids:
        items:
          type: string
        type: array
      allowed_upstream_profile_ids:
        items:
          type: string
        type: array
      expires_at:
        type: string
      name:
        type: string
      scopes:
        example:
        - register_upstream
        items:
          type: string
        type: array
    required:
    - allowed_discovery_config_ids
    - name
    - scopes
    type: object
  handlers.createNodeRequest:
    properties:
      instance_id:
        type: string
      last_seen_at:
        type: string
      name:
        type: string
      private_ip:
        type: string
      region:
        type: string
      ssm_enabled:
        type: boolean
      status:
        type: string
      transport:
        type: string
      transport_config:
        type: object
    required:
    - name
    type: object
  handlers.createUserRequest:
    properties:
      password:
        type: string
      role:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.dnsChallengeRequest:
    properties:
      api_token:
        type: string
      provider:
        type: string
    type: object
  handlers.domainMutationTargetRequest:
    properties:
      add_domains:
        items:
          type: string
        type: array
      config_id:
        type: string
      match_indexes:
        items:
          type: integer
        type: array
      remove_domains:
        items:
          type: string
        type: array
    required:
    - config_id
    type: object
  handlers.loginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.logoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handlers.mutateDomainsRequest:
    properties:
      dns_challenge:
        $ref: '#/definitions/handlers.dnsChallengeRequest'
      dry_run:
        type: boolean
      targets:
        items:
          $ref: '#/definitions/handlers.domainMutationTargetRequest'
        type: array
      update_tls_policies:
        type: boolean
    required:
    - targets
    type: object
  handlers.mutateUpstreamsRequest:
    properties:
      dry_run:
        type: boolean
      targets:
        items:
          $ref: '#/definitions/handlers.upstreamMutationTargetRequest'
        type: array
    required:
    - targets
    type: object
  handlers.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handlers.registerUpstreamByProfileRequest:
    properties:
      dry_run:
        type: boolean
      private_ip:
        type: string
    required:
    - private_ip
    type: object
  handlers.registerUpstreamRequest:
    properties:
      config_id:
        type: string
      dial:
        type: string
      dry_run:
        type: boolean
      port:
        type: integer
      private_ip:
        type: string
    required:
    - config_id
    type: object
  handlers.updateNodeRequest:
    properties:
      instance_id:
        type: string
      last_seen_at:
        type: string
      name:
        type: string
      private_ip:
        type: string
      region:
        type: string
      ssm_enabled:
        type: boolean
      status:
        type: string
      transport:
        type: string
      transport_config:
        type: object
    type: object
  handlers.updateUserRequest:
    properties:
      password:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  handlers.upstreamMutationTargetRequest:
    properties:
      add_dial:
        type: string
      config_id:
        type: string
      probe_timeout_ms:
        type: integer
      prune_unhealthy:
        type: boolean
      remove_dial:
        type: string
    required:
    - config_id
    type: object
  handlers.upstreamProfileWriteRequest:
    properties:
      bindings:
        items:
          $ref: '#/definitions/models.UpstreamProfileBinding'
        type: array
      description:
        type: string
      name:
        type: string
    required:
    - bindings
    - name
    type: object
  models.APIKey:
    properties:
      allowed_discovery_config_ids:
        items:
          type: string
        type: array
      allowed_upstream_profile_ids:
        items:
          type: string
        type: array
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      key_prefix:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      revoked_at:
        type: string
      scopes:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  models.APIKeyCreateResponse:
    properties:
      api_key:
        $ref: '#/definitions/models.APIKey'
      secret:
        type: string
    type: object
  models.APIKeyListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/models.APIKey'
        type: array
    type: object
  models.BackfillSnapshotsResponse:
    properties:
      duration_ms:
        example: 123
        type: integer
      rows_updated:
        example: 42
        type: integer
    type: object
  models.CaddyConfigHostsResponse:
    properties:
      host_count:
        type: integer
      hosts:
        items:
          type: string
        type: array
      id:
        type: string
    type: object
  models.CaddyConfigIDInfo:
    properties:
      has_upstreams:
        type: boolean
      host_count:
        type: integer
      id:
        type: string
      upstream_count:
        type: integer
      upstreams:
        items: {}
        type: array
    type: object
  models.CaddyConfigIDsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/models.CaddyConfigIDInfo'
        type: array
    type: object
  models.CaddyConfigUpstreamsResponse:
    properties:
      has_upstreams:
        type: boolean
      id:
        type: string
      upstream_count:
        type: integer
      upstreams:
        items: {}
        type: array
    type: object
  models.CaddyNode:
    properties:
      created_at:
        type: string
      discovery_config_id:
        type: string
      id:
        type: string
      instance_id:
        type: string
      last_seen_at:
        type: string
      name:
        type: string
      private_ip:
        type: string
      region:
        type: string
      ssm_enabled:
        description: 'Deprecated: use Transport == TransportAWSSSM instead; kept for
          API compatibility.'
        type: boolean
      status:
        type: string
      transport:
        type: string
      transport_config:
        type: object
      updated_at:
        type: string
    type: object
  models.DiscoveryConfig:
    properties:
      created_at:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      method:
        type: string
      name:
        type: string
      parameters:
        type: object
      region:
        type: string
      snapshot_scope:
        allOf:
        - $ref: '#/definitions/models.SnapshotScope'
        enum:
        - node
        - group
        example: node
      tag_key:
        type: string
      tag_value:
        type: string
      updated_at:
        type: string
    type: object
  models.DomainMutationDiff:
    properties:
      added:
        items:
          type: string
        type: array
      removed:
        items:
          type: string
        type: array
    type: object
  models.DomainMutationResult:
    properties:
      added:
        items:
          type: string
        type: array
      changed:
        type: boolean
      config_id:
        type: string
      hosts:
        items:
          type: string
        type: array
      removed:
        items:
          type: string
        type: array
    type: object
  models.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  models.MutateDomainsResponse:
    properties:
      changed:
        type: boolean
      diff:
        $ref: '#/definitions/models.DomainMutationDiff'
      dry_run:
        type: boolean
      preview:
        additionalProperties: {}
        type: object
      results:
        items:
          $ref: '#/definitions/models.DomainMutationResult'
        type: array
    type: object
  models.MutateUpstreamsResponse:
    properties:
      changed:
        type: boolean
      diff:
        $ref: '#/definitions/models.UpstreamMutationDiff'
      dry_run:
        type: boolean
      preview:
        additionalProperties: {}
        type: object
      results:
        items:
          $ref: '#/definitions/models.UpstreamMutationResult'
        type: array
    type: object
  models.PropagateConfigResponse:
    properties:
      applied_to:
        items:
          type: string
        type: array
      skipped:
        items:
          type: string
        type: array
      source_node_id:
        type: string
    type: object
  models.RegisterUpstreamProfileResponse:
    properties:
      changed:
        type: boolean
      discovery_config_id:
        type: string
      dry_run:
        type: boolean
      mutate:
        $ref: '#/definitions/models.MutateUpstreamsResponse'
      propagate:
        $ref: '#/definitions/models.PropagateConfigResponse'
      source_node_id:
        type: string
      targets:
        items:
          $ref: '#/definitions/models.RegisterUpstreamProfileTarget'
        type: array
      upstream_profile_id:
        type: string
    type: object
  models.RegisterUpstreamProfileTarget:
    properties:
      config_id:
        type: string
      dial:
        type: string
    type: object
  models.RegisterUpstreamResponse:
    properties:
      changed:
        type: boolean
      dial:
        type: string
      discovery_config_id:
        type: string
      dry_run:
        type: boolean
      mutate:
        $ref: '#/definitions/models.MutateUpstreamsResponse'
      propagate:
        $ref: '#/definitions/models.PropagateConfigResponse'
      source_node_id:
        type: string
    type: object
  models.SnapshotScope:
    enum:
    - node
    - group
    type: string
    x-enum-varnames:
    - SnapshotScopeNode
    - SnapshotScopeGroup
  models.UpstreamMutationDiff:
    properties:
      added:
        items:
          type: string
        type: array
      pruned:
        items:
          type: string
        type: array
      removed:
        items:
          type: string
        type: array
    type: object
  models.UpstreamMutationResult:
    properties:
      added:
        items:
          type: string
        type: array
      changed:
        type: boolean
      config_id:
        type: string
      pruned:
        items:
          type: string
        type: array
      removed:
        items:
          type: string
        type: array
      upstreams:
        items:
          type: string
        type: array
    type: object
  models.UpstreamProfile:
    properties:
      bindings:
        items:
          type: object
        type: array
      created_at:
        type: string
      description:
        type: string
      discovery_config_id:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.UpstreamProfileBinding:
    properties:
      config_id:
        type: string
      port:
        type: integer
    type: object
  models.User:
    properties:
      created_at:
        type: string
      id:
        type: string
      role:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
info:
  contact: {}
  description: 'API for managing Caddy nodes: AWS SSM, SSH, HTTP admin, GCP OS Config,
    Azure Run Command, or inventory-only; discovery includes AWS, static IP, GCP labels,
    and Azure tags.'
  title: Caddy Dashboard API
  version: "1.0"
paths:
  /api/v1/api-keys:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIKeyListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List API keys
      tags:
      - api-keys
    post:
      consumes:
      - application/json
      description: Returns the secret once; it cannot be retrieved again.
      parameters:
      - description: API key payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.createAPIKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.APIKeyCreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create API key
      tags:
      - api-keys
  /api/v1/api-keys/{id}:
    delete:
      parameters:
      - description: API key ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete API key
      tags:
      - api-keys
  /api/v1/api-keys/{id}/revoke:
    post:
      parameters:
      - description: API key ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke API key
      tags:
      - api-keys
  /api/v1/audit:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List audit logs
      tags:
      - audit
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user and returns access and refresh JWTs
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: User login
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the provided refresh token
      parameters:
      - description: Logout payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.logoutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Issues a new access and refresh token pair
      parameters:
      - description: Refresh payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Refresh token
      tags:
      - auth
  /api/v1/discovery:
    get:
      description: Returns discovery rules
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.DiscoveryConfig'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List discovery configs
      tags:
      - discovery
    post:
      consumes:
      - application/json
      description: 'Creates a discovery rule (methods: aws_tag, aws_ssm, static_ip,
        gcp_labels, azure_tags; aws_cidr not implemented). For gcp_labels / azure_tags
        optional parameters JSON field `node_transport` may be `gcp_osconfig` or `azure_run_command`
        to register runnable nodes (default inventory_only).'
      parameters:
      - description: Discovery config payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/models.DiscoveryConfig'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.DiscoveryConfig'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create discovery config
      tags:
      - discovery
  /api/v1/discovery/{id}:
    delete:
      parameters:
      - description: Discovery config ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete discovery config
      tags:
      - discovery
    get:
      parameters:
      - description: Discovery config ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DiscoveryConfig'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get discovery config
      tags:
      - discovery
    put:
      consumes:
      - application/json
      parameters:
      - description: Discovery config ID
        in: path
        name: id
        required: true
        type: string
      - description: Discovery config payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/models.DiscoveryConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DiscoveryConfig'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update discovery config
      tags:
      - discovery
  /api/v1/discovery/{id}/register-upstream:
    post:
      consumes:
      - application/json
      description: Adds an upstream dial to the first reachable Caddy node in the
        group and propagates config to peers. Authenticated via API key.
      parameters:
      - description: Discovery config ID (Caddy proxy group)
        in: path
        name: id
        required: true
        type: string
      - description: Registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.registerUpstreamRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RegisterUpstreamResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - APIKeyAuth: []
      summary: Register upstream dial on a Caddy discovery group
      tags:
      - discovery
  /api/v1/discovery/{id}/run:
    post:
      description: Executes discovery for a specific discovery config and upserts
        found nodes
      parameters:
      - description: Discovery config ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Run discovery
      tags:
      - discovery
  /api/v1/discovery/{id}/snapshots:
    get:
      description: Returns stored Caddy snapshots for a discovery group
      parameters:
      - description: Discovery config ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List discovery group snapshots
      tags:
      - discovery
  /api/v1/discovery/{id}/upstream-profiles:
    get:
      parameters:
      - description: Discovery config ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List upstream profiles for a discovery group
      tags:
      - upstream-profiles
    post:
      consumes:
      - application/json
      parameters:
      - description: Discovery config ID
        in: path
        name: id
        required: true
        type: string
      - description: Profile payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.upstreamProfileWriteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.UpstreamProfile'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Conflict
          schema:

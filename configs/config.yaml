server:
  port: "8080"
  gin_mode: "release"
  read_header_timeout: 5s
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 15s
  max_body_bytes: 1048576
  max_apply_body_bytes: 10485760
  enable_swagger: true
  # Keep explicit origins; empty means CORS is effectively disabled.
  cors_allowed_origins: []

auth:
  token_ttl_minutes: 60
  refresh_ttl_minutes: 10080
  issuer: "caddy-dashboard"
  audience: "caddy-dashboard-api"
  jwt_secret_arn: ""
  users_secret_arn: ""

aws:
  profile: ""
  optional: false
  regions:
    - eu-south-1
    - eu-central-1

# Optional: native guest execution via GCP VM Manager / OS Config (ADC on the API host).
gcp:
  enabled: true
  osconfig_timeout: 3m
  assignment_prefix: caddy-dash

# Optional: native guest execution via Azure VM Run Command (DefaultAzureCredential).
azure:
  enabled: true
  run_command_timeout: 3m
  run_command_poll: 2s

caddy:
  cache_ttl: 2m
  ssh_timeout: 2m
  ssh_idle_ttl: 5m
  http_admin_timeout: 60s
  http_max_response_body: 33554432
  secret_cache_ttl: 5m

database:
  host: ""
  port: 3306
  name: caddy_dashboard
  user: ""
  password: ""
  params: charset=utf8mb4&parseTime=True&loc=Local
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m
  conn_max_idle_time: 10m
  connect_retries: 10
  connect_backoff: 500ms

scheduler:
  enabled: true
  log_retention_days: 30
  global_timeout: 30m

observability:
  log_level: info

server:
  port: "8080"
  gin_mode: "release"
  read_header_timeout: 5s
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 15s
  max_body_bytes: 1048576
  max_apply_body_bytes: 10485760
  enable_swagger: true
  # Keep explicit origins; empty means CORS is effectively disabled.
  cors_allowed_origins: []

auth:
  token_ttl_minutes: 60
  refresh_ttl_minutes: 10080
  issuer: "caddy-dashboard"
  audience: "caddy-dashboard-api"
  jwt_secret_arn: ""
  users_secret_arn: ""

aws:
  profile: ""
  regions:
    - eu-south-1
    - eu-central-1

caddy:
  cache_ttl: 2m

database:
  host: ""
  port: 3306
  name: caddy_dashboard
  user: ""
  password: ""
  params: charset=utf8mb4&parseTime=True&loc=Local
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m
  conn_max_idle_time: 10m
  connect_retries: 10
  connect_backoff: 500ms

observability:
  log_level: info
